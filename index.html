<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="./CSS/styles.css" rel="stylesheet">
    <link href="./CSS/BotonModoOscuro.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-dark border-right" id="sidebar-wrapper">
            <div class="sidebar-heading">
                <div class="profile-pic bg-secondary rounded-circle"></div>
            </div>
            <div class="list-group list-group-flush">
                <a href="./index.html" class="list-group-item list-group-item-action bg-dark text-white">Ventas</a>
                <a href="./cotizaciones.html" class="list-group-item list-group-item-action bg-dark text-white">Cotizaciones</a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white" data-toggle="collapse" data-target="#inventarioSubmenu" aria-expanded="false" aria-controls="inventarioSubmenu">Inventario</a>
                <div class="collapse" id="inventarioSubmenu">
                    <a href="./Producto.html" class="list-group-item list-group-item-action bg-dark text-white ml-3">Productos</a>
                    <a href="./Categorias.html" class="list-group-item list-group-item-action bg-dark text-white ml-3">Categorías</a>
                </div>
                <a href="./informe.html" class="list-group-item list-group-item-action bg-dark text-white">Informes</a>
                <a href="./contratos.html" class="list-group-item list-group-item-action bg-dark text-white">Contratos</a>
            </div>
        </div>
        <!-- /#sidebar-wrapper -->

        <!-- Page Content -->
        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                <button class="btn btn-primary" id="menu-toggle">☰</button>
                <div class="ml-auto d-flex align-items-center">
                    <!-- Botón modo oscuro -->
                    <div id="toggle" class="mr-3">
                        <i class="indicator"></i>
                    </div>
                    <!-- Dropdown de usuario -->
                    <div class="dropdown">
                        <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton"
                            data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            ☰
                        </button>
                        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="dropdownMenuButton">
                            <a class="dropdown-item" href="#">Usuario</a>
                            <a class="dropdown-item" href="Login.html">Cerrar sesión</a>
                        </div>
                    </div>
                </div>
            </nav>
            <br>


            <section id="ventas" class="section active bg-info text-white p-4">
                <div class="container-fluid">
                    <h1 style="color: black;"> Ventas</h1>
                    <form class="form-inline mb-4">
                        <div class="form-group mx-sm-3 mb-2">
                            <label for="codigo" class="sr-only">Codigo</label>
                            <input type="text" class="form-control" id="codigo" placeholder="Codigo">
                        </div>
                        <div class="form-group mx-sm-3 mb-2">
                            <label for="producto" class="sr-only">Producto</label>
                            <input type="text" class="form-control" id="producto" placeholder="Producto">
                        </div>
                        <div class="form-group mx-sm-3 mb-2">
                            <label for="valor" class="sr-only">Valor</label>
                            <input type="number" class="form-control" id="valor" placeholder="Valor" min="0" step="1" readonly>
                        </div>
                        <div class="form-group mx-sm-3 mb-2">
                            <label for="stock" class="sr-only">Stock</label>
                            <input type="text" class="form-control" id="stock" placeholder="Stock disponible" readonly>
                        </div>
                        <div class="form-group mx-sm-3 mb-2">
                            <label for="cantidad" class="sr-only">Cantidad</label>
                            <input type="number" class="form-control" id="cantidad" placeholder="Cantidad" min="1" step="1">
                        </div>
                        <div class="form-group mx-sm-3 mb-2">
                            <label for="comprador" class="sr-only">Usuario</label>
                            <input type="text" class="form-control" id="comprador" placeholder="Usuario">
                        </div>
                    </form>
                    
                    <div class="table-responsive mt-4">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>Código</th>
                                    <th>Producto</th>
                                    <th>Valor</th>
                                    <th>Cantidad</th>
                                    <th>Stock restante</th>
                                    <th>Subtotal</th>
                                    <th>Fecha</th>
                                    <th>Usuario</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Filas de datos -->
                            </tbody>
                        </table>
                    </div>
                    <div class="total-container mt-3 mb-3">
                        <div id="total-venta" class="alert alert-success p-3">
                            <h4 class="mb-0">Total: $0</h4>
                        </div>
                    </div>
                    
                    <div class="actions">
                        <button type="button" id="btnAgregar" class="btn btn-success">Agregar</button>
                        <button type="button" id="btnBoleta" class="btn btn-primary">Generar Boleta</button>
                        <button type="button" id="btnFactura" class="btn btn-warning" data-toggle="modal" data-target="#facturaModal">Generar Factura</button>
                        <button type="button" id="btnEliminar" class="btn btn-danger">Eliminar</button>
                        <button type="button" id="btnConfigEmpresa" class="btn btn-info">Configurar Empresa</button>
                    </div>
                </div>
                <!-- Modal para datos de factura (dentro de la sección de ventas) -->
                <div class="modal fade" id="facturaModal" tabindex="-1" role="dialog" aria-labelledby="facturaModalLabel" aria-hidden="true">
                    <div class="modal-dialog" role="document">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="facturaModalLabel">Datos para Factura</h5>
                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>
                            <div class="modal-body">
                                <form id="facturaForm">
                                    <div class="form-group">
                                        <label for="rutEmpresaModal">RUT de Empresa</label>
                                        <input type="text" class="form-control" id="rutEmpresaModal" placeholder="Ingrese RUT (Formato: 12345678-9)" 
                                            pattern="^[0-9]+-[0-9kK]{1}$" title="Formato: 12345678-9" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="emailModal">Correo Electrónico</label>
                                        <input type="email" class="form-control" id="emailModal" placeholder="Ingrese correo electrónico" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="usuarioFacturaModal">Usuario</label>
                                        <input type="text" class="form-control" id="usuarioFacturaModal" placeholder="Ingrese nombre de usuario" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="direccionEmpresaModal">Dirección de Empresa</label>
                                        <input type="text" class="form-control" id="direccionEmpresaModal" placeholder="Ingrese dirección de la empresa">
                                    </div>
                                    <div class="form-group">
                                        <label for="giroEmpresaModal">Giro de Empresa</label>
                                        <input type="text" class="form-control" id="giroEmpresaModal" placeholder="Ingrese giro de la empresa">
                                    </div>
                                </form>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                                <button type="button" class="btn btn-primary" id="btnGenerarFacturaModal">Generar Factura</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
        <!-- /#page-content-wrapper -->
    </div>
    <!-- /#wrapper -->

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="JS/layout.js"></script>
</body>

</html>
