    <!-- /#Boton modo oscuro -->
    <script>
        const body = document.querySelector('body');
        const sectionVentas = document.querySelector('#ventas'); // Selección del section de ventas
        const toggle = document.getElementById('toggle');

        toggle.onclick = function () {
            toggle.classList.toggle('active');
            // Cambiar el color del fondo del body
            body.classList.toggle('modo-oscuro'); 
            // Cambiar el color del fondo del section
            sectionVentas.classList.toggle('modo-oscuro-section'); 
        }
    </script>
    <script>
        // Función para obtener los datos de ventas desde la base de datos
        async function fetchSalesData() {
            try {
                const response = await fetch('/api/ventas'); // Endpoint del backend
                const salesData = await response.json();

                // Llenar la tabla con los datos obtenidos
                const tableBody = document.querySelector('table tbody');
                tableBody.innerHTML = ''; // Limpiar contenido previo

                salesData.forEach((venta) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${venta.codigo}</td>
                        <td>${venta.producto}</td>
                        <td>${venta.valor}</td>
                        <td>${venta.cantidad}</td>
                        <td>${venta.fecha_compra}</td>
                        <td>${venta.usuario}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error al obtener los datos de ventas:', error);
            }
        }

        // Llamar a la función al cargar la página
        document.addEventListener('DOMContentLoaded', fetchSalesData);
    </script>
</body>
