<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Inventario</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="./CSS/styles.css" rel="stylesheet">
    <link href="./CSS/Inventario.css" rel="stylesheet">
    <link href="./CSS/modal.css" rel="stylesheet">
    <link href="./CSS/BotonModoOscuro.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-dark border-right" id="sidebar-wrapper">
            <div class="sidebar-heading">
                <div class="profile-pic bg-secondary rounded-circle"></div>
            </div>
            <div class="list-group list-group-flush">
                <a href="./index.html" class="list-group-item list-group-item-action bg-dark text-white">Ventas</a>
                <a href="./cotizaciones.html"
                    class="list-group-item list-group-item-action bg-dark text-white">Cotizaciones</a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white" data-toggle="collapse"
                    data-target="#inventarioSubmenu" aria-expanded="false"
                    aria-controls="inventarioSubmenu">Inventario</a>
                <div class="collapse" id="inventarioSubmenu">
                    <a href="./Producto.html"
                        class="list-group-item list-group-item-action bg-dark text-white ml-3">Productos</a>
                    <a href="./Categorias.html"
                        class="list-group-item list-group-item-action bg-dark text-white ml-3">Categorías</a>
                </div>
                <a href="./informe.html" class="list-group-item list-group-item-action bg-dark text-white">Informes</a>
                <a href="./contratos.html"
                    class="list-group-item list-group-item-action bg-dark text-white">Contratos</a>
            </div>
        </div>
        <!-- /#sidebar-wrapper -->

        <!-- Page Content -->
        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                <button class="btn btn-primary" id="menu-toggle">☰</button>
                <div class="ml-auto d-flex align-items-center">
                    <!-- Botón modo oscuro -->
                    <div id="toggle" class="mr-3">
                        <i class="indicator"></i>
                    </div>
                    <!-- Dropdown de usuario -->
                    <div class="dropdown">
                        <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton"
                            data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            ☰
                        </button>
                        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="dropdownMenuButton">
                            <a class="dropdown-item" href="#">Usuario</a>
                            <a class="dropdown-item" href="Login.html">Cerrar sesión</a>
                        </div>
                    </div>
                </div>
            </nav>
            <br>
            <section id="ventas" class="section active bg-info text-white p-4">
                <div class="container-fluid">
                    <h1 class="mb-4" style="color: black;">Categorías</h1>
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Id</th>
                                <th>Nombre</th>
                                <th>Descripción</th>
                                <th>Fecha</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Las filas se cargarán dinámicamente -->
                        </tbody>
                    </table>
                    <div class="actions">
                        <button type="button" class="btn btn-success" data-toggle="modal" data-target="#categoryModal"
                            data-action="add">Agregar</button>
                    </div>
                </div>
            </section>
        </div>
        <!-- /#page-content-wrapper -->
    </div>
    <!-- /#wrapper -->

    <!-- Modal para agregar o editar categorías -->
    <div class="modal fade" id="categoryModal" tabindex="-1" role="dialog" aria-labelledby="categoryModalLabel"
        aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalLabel">Agregar Categoría</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="categoryForm">
                        <div class="form-group">
                            <label for="modalNombreCategoria">Nombre de la Categoría</label>
                            <input type="text" class="form-control" id="modalNombreCategoria" placeholder="Nombre">
                        </div>
                        <div class="form-group">
                            <label for="modalDescripcionCategoria">Descripción</label>
                            <input type="text" class="form-control" id="modalDescripcionCategoria"
                                placeholder="Descripción">
                        </div>
                        <div class="form-group">
                            <label for="modalFechaCategoria">Fecha de Creación</label>
                            <input type="date" class="form-control" id="modalFechaCategoria">
                        </div>
                        <button type="button" id="saveCategory" class="btn btn-success"
                            data-action="add">Guardar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- /#categoryModal -->

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        // Alternar la navegación lateral
        document.getElementById('menu-toggle').addEventListener('click', function (e) {
            e.preventDefault();
            document.getElementById('wrapper').classList.toggle('toggled');
        });

        // Modo oscuro
        const body = document.querySelector('body');
        const sectionVentas = document.querySelector('#ventas');
        const toggle = document.getElementById('toggle');

        toggle.onclick = function () {
            toggle.classList.toggle('active');
            body.classList.toggle('modo-oscuro');
            sectionVentas.classList.toggle('modo-oscuro-section');
        };

        // Cargar categorías desde la API
        async function cargarCategorias() {
            try {
                const response = await fetch("http://localhost:3002/Categorias");
                const categorias = await response.json();
                const categoriasTable = document.querySelector("tbody");
                categoriasTable.innerHTML = ""; // Limpiar las filas existentes

                categorias.forEach((categoria) => {
                    const row = `
                        <tr>
                            <td>${categoria.id_categoria}</td>
                            <td>${categoria.nombre}</td>
                            <td>${categoria.descripcion || "Sin descripción"}</td>
                            <td>${categoria.fecha_creacion || "Sin fecha"}</td>
                            <td>
                                <button data-id="${categoria.id_categoria}" class="btn btn-primary btn-sm edit-button" data-toggle="modal" data-target="#categoryModal">Editar</button>
                                <button data-id="${categoria.id_categoria}" class="btn btn-danger btn-sm delete-button">Eliminar</button>
                            </td>
                        </tr>
                    `;
                    categoriasTable.innerHTML += row;
                });

                // Agregar eventos a los botones de editar y eliminar
                document.querySelectorAll('.edit-button').forEach(button => {
                    button.addEventListener('click', editarCategoria); // Cambiado a editarCategoria
                });
                document.querySelectorAll('.delete-button').forEach(button => {
                    button.addEventListener('click', eliminarCategoria);
                });
            } catch (error) {
                console.error('Error al cargar las categorías:', error);
            }
        }

        // Mostrar formulario para editar categoría
        function editarCategoria(event) {
            const idCategoria = event.target.dataset.id;
            const modal = document.getElementById('categoryModal');
            const modalTitle = modal.querySelector('.modal-title');
            const saveButton = modal.querySelector('#saveCategory');

            modalTitle.textContent = 'Editar Categoría';
            saveButton.dataset.action = 'edit';
            saveButton.dataset.id = idCategoria;

            fetch(`http://localhost:3002/Categorias/${idCategoria}`)
                .then(response => response.json())
                .then(categoria => {
                    document.getElementById('modalNombreCategoria').value = categoria.nombre;
                    document.getElementById('modalDescripcionCategoria').value = categoria.descripcion;
                    document.getElementById('modalFechaCategoria').value = categoria.fecha_creacion;
                })
                .catch(error => console.error('Error al cargar la categoría:', error));
        }

        // Guardar categoría (Agregar o Editar)
        async function guardarCategoria(event) {
            const action = event.target.dataset.action;
            const idCategoria = event.target.dataset.id;
            const nombre = document.getElementById('modalNombreCategoria').value.trim();
            const descripcion = document.getElementById('modalDescripcionCategoria').value.trim();
            const fechaCreacion = document.getElementById('modalFechaCategoria').value;

            if (!nombre || !fechaCreacion) {
                alert('El nombre y la fecha de creación son obligatorios.');
                return;
            }

            const url = action === 'edit' ? `http://localhost:3002/Categorias/${idCategoria}` : 'http://localhost:3002/Categorias';
            const method = action === 'edit' ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, descripcion, fecha_creacion: fechaCreacion })
                });

                console.log('Estado de la respuesta:', response.status);

                if (response.ok) {
                    alert(`Categoría ${action === 'edit' ? 'editada' : 'agregada'} correctamente`);
                    cargarCategorias();
                    $('#categoryModal').modal('hide');
                } else {
                    // Intenta analizar el cuerpo de la respuesta solo si es JSON
                    let errorData;
                    try {
                        errorData = await response.json();
                    } catch (jsonError) {
                        console.error('No se pudo analizar el cuerpo de la respuesta como JSON:', jsonError);
                    }

                    console.error('Error en la respuesta:', errorData || response.statusText);
                    alert('Error al guardar la categoría');
                }
            } catch (error) {
                console.error('Error al guardar la categoría:', error);
                alert('Error de conexión o problema inesperado');
            }
        }

        // Eliminar categoría
        async function eliminarCategoria(event) {
            const idCategoria = event.target.dataset.id;

            if (confirm('¿Estás seguro de que deseas eliminar esta categoría?')) {
                try {
                    const response = await fetch(`http://localhost:3002/Categorias/${idCategoria}`, { method: 'DELETE' });

                    if (response.ok) {
                        alert('Categoría eliminada correctamente');
                        cargarCategorias();
                    } else {
                        const errorData = await response.json();
                        console.error('Error en la respuesta del servidor:', errorData);
                        alert(`Error al eliminar la categoría: ${errorData.message || 'Error desconocido'}`);
                    }
                } catch (error) {
                    console.error('Error al eliminar la categoría:', error);
                    alert('Error de conexión o problema inesperado');
                }
            }
        }

        // Inicializar la página
        document.addEventListener('DOMContentLoaded', () => {
            cargarCategorias();
            document.getElementById('saveCategory').addEventListener('click', guardarCategoria);
        });
    </script>
</body>

</html>
