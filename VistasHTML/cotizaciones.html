<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizaciones</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="./CSS/styles.css" rel="stylesheet">
    <link href="./CSS/cotizaciones.css" rel="stylesheet"> <!-- CSS específico para el diseño de cotizaciones -->
    <link href="./CSS/BotonModoOscuro.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-dark border-right" id="sidebar-wrapper">
            <div class="sidebar-heading">
                <div class="profile-pic bg-secondary rounded-circle"></div>
            </div>
            <div class="list-group list-group-flush">
                <a href="./layout.html" class="list-group-item list-group-item-action bg-dark text-white">Ventas</a>
                <a href="./cotizaciones.html" class="list-group-item list-group-item-action bg-dark text-white">Cotizaciones</a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white" data-toggle="collapse" data-target="#inventarioSubmenu" aria-expanded="false" aria-controls="inventarioSubmenu">Inventario</a>
                <div class="collapse" id="inventarioSubmenu">
                    <a href="./Producto.html" class="list-group-item list-group-item-action bg-dark text-white ml-3">Productos</a>
                    <a href="./Categorias.html" class="list-group-item list-group-item-action bg-dark text-white ml-3">Categorías</a>
                </div>
                <a href="./informe.html" class="list-group-item list-group-item-action bg-dark text-white">Informes</a>
                <a href="./contratos.html" class="list-group-item list-group-item-action bg-dark text-white">Contratos</a>
            </div>
        </div>
        <!-- /#sidebar-wrapper -->

        <!-- Page Content -->
        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                <button class="btn btn-primary" id="menu-toggle">☰</button>
                <div class="ml-auto d-flex align-items-center">
                    <!-- Botón modo oscuro -->
                    <div id="toggle" class="mr-3">
                        <i class="indicator"></i>
                    </div>
                    <!-- Dropdown de usuario -->
                    <div class="dropdown">
                        <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton"
                            data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            ☰
                        </button>
                        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="dropdownMenuButton">
                            <a class="dropdown-item" href="#">Usuario</a>
                            <a class="dropdown-item" href="Login.html">Cerrar sesión</a>
                        </div>
                    </div>
                </div>
            </nav>
            <br>
            <section id="contratos" class="section active p-4">
                <div class="container-fluid invoice-container">
                    <div class="header">
                        <div class="company-info">
                            <h1>Empresa</h1>
                            <p>123.456.789.0</p>
                        </div>
                        <div class="quotation-number">
                            <h2>Cotización</h2>
                            <p>Nº: <span id="quoteNumber">2024/001</span></p>
                        </div>
                    </div>

                    <div class="client-info">
                        <div class="info-group">
                            <label>Cliente:</label>
                            <input type="text" id="clientName" title="Nombre del Cliente" placeholder="Nombre del Cliente">
                        </div>
                        <div class="info-group">
                            <label>Rut Empresa</label>
                            <input type="text" id="clientId" title="Rut Empresa" placeholder="Rut Empresa">
                        </div>
                        <div class="info-group">
                            <label>Fecha:</label>
                            <input type="date" id="quoteDate" title="Fecha de la cotización" placeholder="Seleccione la fecha">
                        </div>
                        <div class="info-group">
                            <label>Contacto:</label>
                            <input type="text" id="contactPerson" title="Nombre del Contacto" placeholder="Nombre del Contacto">
                        </div>
                        <div class="info-group">
                            <label>Correo electrónico</label>
                            <input type="email" id="emailClient" placeholder="correo">
                        </div>
                    </div>

                    <table id="itemsTable" class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Referencia</th>
                                <th>Descripción</th>
                                <th>Cantidad</th>
                                <th>Precio</th>
                                <th>Descuento</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="itemsBody">
                            <!-- Items se añadirán aquí -->
                        </tbody>
                    </table>

                    <button onclick="addRow()" class="btn btn-info">Añadir Línea</button>
                    <button type="submit" class="btn btn-success">Enviar correo</button>

                    <div class="totals">
                        <table class="totals-table table">
                            <tr>
                                <td>Subtotal:</td>
                                <td id="subtotal">0 $</td>
                            </tr>
                            <tr>
                                <td>IVA (19%):</td>
                                <td id="iva">0 $</td>
                            </tr>
                            <tr>
                                <td>Total:</td>
                                <td id="total">0 $</td>
                            </tr>
                        </table>
                    </div>
                </div>
            </section>
        </div>
        <!-- /#page-content-wrapper -->
    </div>
    <!-- /#wrapper -->

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="./JS/scripts.js"></script>
    <script src="./JS/cotizaciones.js"></script> <!-- Script específico para manejar la lógica de cotización -->

    <!-- /#Boton modo oscuro -->
    <script>
        const body = document.querySelector('body');
        const sectionVentas = document.querySelector('#ventas'); // Selección del section de ventas
        const toggle = document.getElementById('toggle');

        toggle.onclick = function () {
            toggle.classList.toggle('active');
            // Cambiar el color del fondo del body
            body.classList.toggle('modo-oscuro'); 
            // Cambiar el color del fondo del section
            sectionVentas.classList.toggle('modo-oscuro-section'); 
        }
    </script>
</body>

</html>
