<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contratos</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="./CSS/styles.css" rel="stylesheet">
    <link href="./CSS/BotonModoOscuro.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-dark border-right" id="sidebar-wrapper">
            <div class="sidebar-heading">
                <div class="profile-pic bg-secondary rounded-circle"></div>
            </div>
            <div class="list-group list-group-flush">
                <a href="./layout.html" class="list-group-item list-group-item-action bg-dark text-white">Ventas</a>
                <a href="./cotizaciones.html"
                    class="list-group-item list-group-item-action bg-dark text-white">Cotizaciones</a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white" data-toggle="collapse"
                    data-target="#inventarioSubmenu" aria-expanded="false"
                    aria-controls="inventarioSubmenu">Inventario</a>
                <div class="collapse" id="inventarioSubmenu">
                    <a href="./Producto.html"
                        class="list-group-item list-group-item-action bg-dark text-white ml-3">Productos</a>
                    <a href="./Categorias.html"
                        class="list-group-item list-group-item-action bg-dark text-white ml-3">Categorías</a>
                </div>
                <a href="./informe.html" class="list-group-item list-group-item-action bg-dark text-white">Informes</a>
                <a href="./contratos.html"
                    class="list-group-item list-group-item-action bg-dark text-white">Contratos</a>
            </div>
        </div>
        <!-- /#sidebar-wrapper -->

        <!-- Page Content -->
        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                <button class="btn btn-primary" id="menu-toggle">☰</button>
                <div class="ml-auto d-flex align-items-center">
                    <!-- Botón modo oscuro -->
                    <div id="toggle" class="mr-3">
                        <i class="indicator"></i>
                    </div>
                    <!-- Dropdown de usuario -->
                    <div class="dropdown">
                        <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton"
                            data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            ☰
                        </button>
                        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="dropdownMenuButton">
                            <a class="dropdown-item" href="#">Usuario</a>
                            <a class="dropdown-item" href="Login.html">Cerrar sesión</a>
                        </div>
                    </div>
                </div>
            </nav>
            <br>
            <section id="contratos" class="section active bg-info text-white p-4">
                <div class="container-fluid">
                    <h1 class="mb-4" style="color: #000;">Contratos</h1>
                    <form id="contractForm" class="mb-4">
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label for="nombreEmpleado">Nombre del Empleado</label>
                                <input type="text" class="form-control" id="nombreEmpleado"
                                    placeholder="Nombre del Empleado">
                            </div>
                            <div class="form-group col-md-4">
                                <label for="cargo">Cargo</label>
                                <input type="text" class="form-control" id="cargo" placeholder="Cargo">
                            </div>
                            <div class="form-group col-md-4">
                                <label for="paga">Paga</label>
                                <input type="text" class="form-control" id="paga" placeholder="Paga">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label for="codigo">Código</label>
                                <input type="text" class="form-control" id="codigo" placeholder="Código">
                            </div>
                            <div class="form-group col-md-4">
                                <label for="fechaInicio">Fecha de Inicio</label>
                                <input type="date" class="form-control" id="fechaInicio">
                            </div>
                            <div class="form-group col-md-4">
                                <label for="fechaFin">Fecha de Fin</label>
                                <input type="date" class="form-control" id="fechaFin">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success">Agregar</button>
                        <button type="button" class="btn btn-danger">Eliminar</button>
                        <button type="button" class="btn btn-primary">Generar Contrato</button>
                    </form>
                    <table class="table table-bordered table-hover table-light">
                        <thead>
                            <tr>
                                <th>Usuario</th>
                                <th>Cargo</th>
                                <th>Código</th>
                                <th>Cantidad</th>
                                <th>Fecha de Inicio</th>
                                <th>Fecha de Fin</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Filas de datos -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
        <!-- /#page-content-wrapper -->
    </div>
    <!-- /#wrapper -->

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="./JS/scripts.js"></script>
    <script>
        const body = document.querySelector('body');
        const sectionVentas = document.querySelector('#ventas'); // Selección del section de ventas
        const toggle = document.getElementById('toggle');

        toggle.onclick = function () {
            toggle.classList.toggle('active');
            // Cambiar el color del fondo del body
            body.classList.toggle('modo-oscuro'); 
            // Cambiar el color del fondo del section
            sectionVentas.classList.toggle('modo-oscuro-section'); 
        }
    </script>
</body>

</html>
